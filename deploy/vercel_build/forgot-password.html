<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="description" content="Reset your Vaaani password." />
<title>Forgot password — Vaaani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css" />
<link rel="stylesheet" href="/page.css" />
<link rel="stylesheet" href="/auth.css" />
</head>
<body class="auth-shell">

<nav class="nav scrolled" id="nav">
  <a class="brand" href="/">
    <svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="4" cy="12" r="2"/><circle cx="12" cy="4" r="2"/><circle cx="20" cy="12" r="2"/>
      <circle cx="12" cy="20" r="2"/><circle cx="12" cy="12" r="1.5"/>
    </svg>
    <span class="brand-word"><span>Vaa</span><span class="accent">ani</span></span>
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
  </div>
  <div class="nav-cta" id="navAuth"></div>
</nav>

<main class="auth-main">
  <div class="auth-card">
    <span class="auth-eyebrow">// Password recovery</span>
    <h1>Reset your password.</h1>
    <p class="auth-sub">Enter the email you signed up with. If we find an account, we'll send you a link to choose a new password.</p>

    <div class="status-msg" id="status" style="display:none;"></div>

    <form id="forgotForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@school.edu" />
      </div>
      <div class="auth-actions">
        <button class="btn btn-primary" type="submit" id="submitBtn">Send reset link</button>
      </div>
    </form>

    <div class="auth-foot">
      Remembered it? <a href="/login">Back to sign in</a>
    </div>
  </div>
</main>

<script src="/auth.js?v=20260526a"></script>
<script>
  const form = document.getElementById('forgotForm');
  const status = document.getElementById('status');
  const submit = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    Auth.setStatus(status, 'info', 'Sending…');
    submit.disabled = true;
    const r = await Auth.json('/auth/forgot-password', {
      method: 'POST',
      body: JSON.stringify({ email: form.email.value.trim() }),
    });
    submit.disabled = false;
    // Always show the same success message (no account enumeration).
    if (r.ok) {
      Auth.setStatus(status, 'ok', (r.data && r.data.message) ||
        "If an account exists for that email, we've sent a reset link. Check your inbox.");
      form.reset();
    } else {
      Auth.setStatus(status, 'err', (r.data && r.data.detail) || 'Something went wrong. Try again.');
    }
  });
</script>
</body>
</html>

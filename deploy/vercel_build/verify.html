<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Verify email — Vaaani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css" />
<link rel="stylesheet" href="/page.css" />
<link rel="stylesheet" href="/auth.css" />
</head>
<body class="auth-shell">

<nav class="nav scrolled" id="nav">
  <a class="brand" href="/">
    <svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="4" cy="12" r="2"/><circle cx="12" cy="4" r="2"/><circle cx="20" cy="12" r="2"/>
      <circle cx="12" cy="20" r="2"/><circle cx="12" cy="12" r="1.5"/>
    </svg>
    <span class="brand-word"><span>Vaa</span><span class="accent">ani</span></span>
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/ipa">IPA Chart</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
  </div>
  <div class="nav-cta" id="navAuth"></div>
</nav>

<main class="auth-main">
  <div class="auth-card" id="card">
    <span class="auth-eyebrow">// Email verification</span>
    <h1 id="title">Checking…</h1>
    <p class="auth-sub" id="subtitle">One moment.</p>
    <div class="status-msg" id="status" style="display:none;"></div>
    <div class="auth-actions">
      <a class="btn btn-primary" href="/learn" id="primaryAction" style="display:none;">Explore missions <span class="arr">→</span></a>
      <a class="btn btn-ghost" href="/account" id="secondaryAction" style="display:none;">Go to account</a>
    </div>
  </div>
</main>

<script src="/auth.js?v=20260526a"></script>
<script>
  // The /auth/verify-email/{token} route redirects here with ?status=ok|invalid.
  // If the user landed directly with a ?token=... param (e.g. clicked link
  // before backend rewrote the URL), forward to the verification endpoint.
  const params = new URLSearchParams(window.location.search);
  const status = params.get('status');
  const token = params.get('token');

  const title = document.getElementById('title');
  const subtitle = document.getElementById('subtitle');
  const primary = document.getElementById('primaryAction');
  const secondary = document.getElementById('secondaryAction');
  const statusEl = document.getElementById('status');

  function paintOk() {
    title.textContent = 'You’re verified.';
    subtitle.textContent = 'Your email is confirmed. You can launch Vaaani now.';
    Auth.setStatus(statusEl, 'ok', 'Email verified.');
    primary.style.display = 'inline-flex';
    secondary.style.display = 'inline-flex';
  }
  function paintInvalid() {
    title.textContent = 'Link expired or already used.';
    subtitle.textContent = 'The verification link is no longer valid. You can request a new one from your account page.';
    Auth.setStatus(statusEl, 'warn', 'Verification link not accepted.');
    secondary.style.display = 'inline-flex';
  }

  if (status === 'ok') paintOk();
  else if (status === 'invalid') paintInvalid();
  else if (token) window.location = '/auth/verify-email/' + encodeURIComponent(token);
  else {
    title.textContent = 'Nothing to verify here.';
    subtitle.textContent = 'Open your verification email and click the link inside.';
    secondary.style.display = 'inline-flex';
  }
</script>
</body>
</html>

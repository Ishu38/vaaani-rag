<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="theme-color" content="#2563eb" />
<title>Offline · Vaaani</title>
<style>
  html, body { margin: 0; height: 100%; background: #fff3d5; color: #2563eb;
    font-family: 'Inter', -apple-system, "Segoe UI", system-ui, sans-serif;
    display: grid; place-items: center; text-align: center; padding: 24px; }
  .card { max-width: 28rem; }
  svg { width: 64px; height: 64px; margin-bottom: 18px; color: #2563eb; }
  h1 { font-size: 1.5rem; margin: 0 0 8px; font-weight: 700; letter-spacing: -0.02em; }
  p { margin: 0 0 18px; color: #3b82f6; line-height: 1.5; }
  button { background: #2563eb; color: #fff3d5; border: 0; padding: 10px 18px;
    border-radius: 8px; font: inherit; font-weight: 600; cursor: pointer; }
  button:hover { background: #3d5a3e; }
</style>
</head>
<body>
<div class="card">
  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
    <circle cx="4" cy="12" r="2"/><circle cx="12" cy="4" r="2"/>
    <circle cx="20" cy="12" r="2"/><circle cx="12" cy="20" r="2"/>
    <circle cx="12" cy="12" r="1.5"/>
    <path d="M4 12 L12 4 L20 12 L12 20 Z" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.6"/>
  </svg>
  <h1>You're offline</h1>
  <p>Vaaani needs the network to talk to your brain. Reconnect and try again — your past chats stay safe on the server.</p>
  <button onclick="location.reload()">Retry</button>
</div>
</body>
</html>

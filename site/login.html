<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="description" content="Sign in to Vaaani — your Socratic AI study assistant." />
<title>Sign in — Vaaani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css" />
<link rel="stylesheet" href="/page.css" />
<link rel="stylesheet" href="/auth.css" />
</head>
<body class="auth-shell">

<nav class="nav scrolled" id="nav">
  <a class="brand" href="/">
    <svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="4" cy="12" r="2"/><circle cx="12" cy="4" r="2"/><circle cx="20" cy="12" r="2"/>
      <circle cx="12" cy="20" r="2"/><circle cx="12" cy="12" r="1.5"/>
    </svg>
    <span class="brand-word"><span>Vaa</span><span class="accent">ani</span></span>
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/pricing">Pricing</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
  </div>
  <div class="nav-cta" id="navAuth"></div>
</nav>

<main class="auth-main">
  <div class="auth-card">
    <span class="auth-eyebrow">// Welcome back</span>
    <h1>Sign in.</h1>
    <p class="auth-sub">Pick up where you left off — your skill map, review queue, and uploaded library all wait for you.</p>

    <div class="status-msg" id="status" style="display:none;"></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@school.edu" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="Your password" />
      </div>
      <div class="auth-actions">
        <button class="btn btn-primary" type="submit" id="submitBtn">Sign in</button>
        <div class="divider">or</div>
        <button class="btn btn-google" type="button" id="googleBtn">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A10.99 10.99 0 0 0 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.1A6.6 6.6 0 0 1 5.47 12c0-.73.13-1.43.36-2.1V7.07H2.18A11 11 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.83z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.46 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/>
          </svg>
          Continue with Google
        </button>
        <button class="btn btn-github" type="button" id="githubBtn">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          Continue with GitHub
        </button>
      </div>
    </form>

    <div class="auth-foot">
      New to Vaaani? <a href="/signup">Create an account</a>
    </div>
  </div>
</main>

<script src="/auth.js?v=20260526a"></script>
<script>
  Auth.wireGoogleButton(document.getElementById('googleBtn'));
  Auth.wireGithubButton(document.getElementById('githubBtn'));

  const form = document.getElementById('loginForm');
  const status = document.getElementById('status');
  const submit = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    Auth.setStatus(status, 'info', 'Signing in…');
    submit.disabled = true;
    const r = await Auth.json('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email: form.email.value.trim(), password: form.password.value }),
    });
    submit.disabled = false;
    if (!r.ok) {
      Auth.setStatus(status, 'err', (r.data && r.data.detail) || 'Sign-in failed.');
      return;
    }
    Auth.setStatus(status, 'ok', 'Signed in. Redirecting…');
    setTimeout(() => { window.location = '/account'; }, 500);
  });
</script>
</body>
</html>

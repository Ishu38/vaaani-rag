<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="description" content="Choose a new Vaaani password." />
<title>Choose a new password — Vaaani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css" />
<link rel="stylesheet" href="/page.css" />
<link rel="stylesheet" href="/auth.css" />
</head>
<body class="auth-shell">

<nav class="nav scrolled" id="nav">
  <a class="brand" href="/">
    <svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="4" cy="12" r="2"/><circle cx="12" cy="4" r="2"/><circle cx="20" cy="12" r="2"/>
      <circle cx="12" cy="20" r="2"/><circle cx="12" cy="12" r="1.5"/>
    </svg>
    <span class="brand-word"><span>Vaa</span><span class="accent">ani</span></span>
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
  </div>
  <div class="nav-cta" id="navAuth"></div>
</nav>

<main class="auth-main">
  <div class="auth-card">
    <span class="auth-eyebrow">// New password</span>
    <h1>Choose a new password.</h1>
    <p class="auth-sub">Pick a strong password (at least 8 characters). You'll be signed in right after.</p>

    <div class="status-msg" id="status" style="display:none;"></div>

    <form id="resetForm" novalidate>
      <div class="field">
        <label for="password">New password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required minlength="8" placeholder="At least 8 characters" />
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input id="confirm" name="confirm" type="password" autocomplete="new-password" required minlength="8" placeholder="Type it again" />
      </div>
      <div class="auth-actions">
        <button class="btn btn-primary" type="submit" id="submitBtn">Set new password</button>
      </div>
    </form>

    <div class="auth-foot">
      <a href="/login">Back to sign in</a>
    </div>
  </div>
</main>

<script src="/auth.js?v=20260526a"></script>
<script>
  const form = document.getElementById('resetForm');
  const status = document.getElementById('status');
  const submit = document.getElementById('submitBtn');
  const token = new URLSearchParams(location.search).get('token') || '';

  if (!token) {
    Auth.setStatus(status, 'err', 'This reset link is missing its token. Request a new link from the “Forgot password” page.');
    submit.disabled = true;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (form.password.value !== form.confirm.value) {
      Auth.setStatus(status, 'err', "Those passwords don't match.");
      return;
    }
    if (form.password.value.length < 8) {
      Auth.setStatus(status, 'err', 'Password must be at least 8 characters.');
      return;
    }
    Auth.setStatus(status, 'info', 'Saving…');
    submit.disabled = true;
    const r = await Auth.json('/auth/reset-password', {
      method: 'POST',
      body: JSON.stringify({ token: token, password: form.password.value }),
    });
    submit.disabled = false;
    if (!r.ok) {
      Auth.setStatus(status, 'err', (r.data && r.data.detail) || 'Could not reset password.');
      return;
    }
    Auth.setStatus(status, 'ok', 'Password updated. Taking you in…');
    setTimeout(() => { window.location = (r.data && r.data.user) ? '/account' : '/login'; }, 700);
  });
</script>
</body>
</html>
